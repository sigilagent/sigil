[project]
name = "sigil"
version = "0.2.2"
description = "The skill compiler: SKILL.md compiled through a typed AG-IR into a runnable agent harness, so any model (small and local included) follows the skill by construction."
entry-point = "observatory.jac"

# byLLM is CORE to jac: the native `jac` binary bundles it as the built-in `byllm`
# plugin, so there is NO `pip install byllm`. Import it as
# `import from jaclang.byllm.lib { Model }`, and the ambient `by llm()` uses the
# default model configured in [plugins.byllm.model] below.

# The AG-IR compiler parses the crystallizer's YAML output via PyYAML — the one
# Python dependency the native binary does NOT bundle. `jac install` provisions it
# into the project venv.
[dependencies]
pyyaml = "latest"
# The interactive `chat` REPL and `config` editor (sigil_chat.jac) render with rich
# and use prompt_toolkit for line editing / history when stdin is a TTY.
rich = "~=15.0"
prompt_toolkit = "~=3.0"
# byLLM's streaming path (chat mode streams the reply token-by-token) imports httpx,
# which the native runtime does not bundle — provision it so streaming works.
httpx = "latest"

# Default builtin `llm` model (any by-llm() call that doesn't override). Sigil
# keeps its live model tiers on the graph (Soul), so this is only a seed default.
# Builtin `llm` default. Sigil keeps its live tiers on the graph (Soul:
# frontier=gpt-5, small=gpt-4o-mini), so this only seeds any bare `by llm()`.
# API keys are NOT stored here (jac.toml is git-tracked) — OPENAI_API_KEY /
# ZAI_API_KEY come from the environment / gitignored `.env`, read by litellm.
[plugins.byllm.model]
default_model = "gpt-4o-mini"

# One graph, two doors: `jac run main.jac` (CLI) persists to .jac/data/sigil.db
# (the project-name default), and this points `jac start observatory.jac` at the
# SAME file — so skills taught in the CLI show up live in the Observatory.
# Overridden by MONGODB_URI if set (both sides then need it).
[plugins.scale.database]
shelf_db_path = ".jac/data/sigil.db"

# The client's `sv import from src.sigil` makes `jac start` auto-detect a
# microservice split (gateway + src.sigil subprocess). Sigil is one agent on one
# graph — force the single-process server so the Observatory and API share it.
[plugins.scale.microservices]
enabled = false

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
# the jac client runtime imports @tanstack/react-form; provision it for the web build
"@tanstack/react-form" = "^1.0.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"
vis-network = "^9.1.9"
vis-data = "^7.1.9"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"


