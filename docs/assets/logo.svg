<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tri" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- dashed orbit rings -->
  <g fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity=".85">
    <circle cx="256" cy="256" r="238" stroke-dasharray="10 12"/>
    <circle cx="256" cy="256" r="180" stroke-dasharray="7 11" opacity=".8"/>
  </g>
  <!-- the graph: hexagon + spokes, fine lines -->
  <g fill="none" stroke="#8b5cf6" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="256.0,76.0 411.9,166.0 411.9,346.0 256.0,436.0 100.1,346.0 100.1,166.0"/>
    <path d="M256.0 76.0 L256 256 M411.9 166.0 L256 256 M411.9 346.0 L256 256 M256.0 436.0 L256 256 M100.1 346.0 L256 256 M100.1 166.0 L256 256"/>
  </g>
  <!-- vertex nodes -->
  <g fill="#8b5cf6">
    <circle cx="256.0" cy="76.0" r="9"/>
    <circle cx="411.9" cy="166.0" r="9"/>
    <circle cx="411.9" cy="346.0" r="9"/>
    <circle cx="256.0" cy="436.0" r="9"/>
    <circle cx="100.1" cy="346.0" r="9"/>
    <circle cx="100.1" cy="166.0" r="9"/>
  </g>
  <!-- the compiled core: triangle + center -->
  <polygon points="256.0,152.0 346.1,308.0 165.9,308.0" fill="none" stroke="url(#tri)" stroke-width="3.5" stroke-linejoin="round"/>
  <circle cx="256" cy="256" r="18" fill="#38bdf8"/>
</svg>
