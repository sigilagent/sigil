name: Deploy GitHub Pages

# Publish the static landing page in docs/ to GitHub Pages whenever it changes.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
      - ".github/scripts/build_docs.py"
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-flight run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: build & deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Render every reference doc to its own styled page (plus an index);
      # the .md sources ship alongside — they stay the agent's own self-docs.
      - name: Build docs pages
        run: |
          pip install --quiet markdown
          python3 .github/scripts/build_docs.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
