name: Release

# Publish a GitHub Release for a version tag, attaching the curl|bash installer
# so https://github.com/<repo>/releases/latest/download/install.sh always serves
# the newest install.sh. Cut a release two ways:
#   • push a tag:      git tag v0.2.0 && git push origin v0.2.0
#   • run it by hand:  Actions → Release → Run workflow → tag = v0.2.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to create & release (e.g. v0.2.0)"
        required: true

# Creating releases and tags needs write access to repo contents.
permissions:
  contents: write

# Never release the same tag twice concurrently.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            v*) : ;;
            *)  echo "::error::tag '$tag' must start with 'v' (e.g. v0.2.0)"; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # The CLI banner reads its version from jac.toml, and installs track the default
      # branch — so cutting a release keeps the manifest in lockstep automatically:
      # if the tag is NEWER than jac.toml on the default branch, push a version-bump
      # commit there (Contents API, so the working tree stays at the tag). Equal is a
      # no-op; an OLDER tag (asset refresh, backport) leaves the manifest alone.
      - name: Sync jac.toml version to the tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
          BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          t="${TAG#v}"
          file="$(gh api "repos/$GITHUB_REPOSITORY/contents/jac.toml?ref=$BRANCH")"
          sha="$(jq -r .sha <<<"$file")"
          cur="$(jq -r .content <<<"$file" | base64 -d | sed -n 's/^version *= *"\(.*\)".*/\1/p' | head -1)"
          if [ "$cur" = "$t" ]; then
            echo "jac.toml on $BRANCH already says $t — nothing to sync."
            exit 0
          fi
          hi="$(printf '%s\n%s\n' "$cur" "$t" | sort -V | tail -1)"
          if [ "$hi" != "$t" ]; then
            echo "::warning::tag $TAG is older than jac.toml ($cur) on $BRANCH — leaving the manifest alone."
            exit 0
          fi
          jq -r .content <<<"$file" | base64 -d \
            | awk -v v="$t" '!done && /^version *= */ {print "version = \"" v "\""; done=1; next} {print}' > /tmp/jac.toml
          # If the branch is protected the PUT is refused — warn rather than sink the
          # release (the assets don't depend on the manifest; only the banner drifts).
          if gh api -X PUT "repos/$GITHUB_REPOSITORY/contents/jac.toml" \
            -f message="chore(release): sync jac.toml version to $TAG" \
            -f branch="$BRANCH" -f sha="$sha" \
            -f content="$(base64 -w0 </tmp/jac.toml)"; then
            echo "pushed version bump $cur -> $t to $BRANCH"
          else
            echo "::warning::could not push the version bump to $BRANCH (branch protection?). jac.toml still says $cur — bump it to $t manually, or allow the github-actions app to bypass protection."
          fi

      # Never ship a broken pipe-to-bash installer: fail the release if it won't parse.
      - name: Validate installer
        run: |
          test -f install.sh || { echo "::error::install.sh not found"; exit 1; }
          bash -n install.sh
          shasum -a 256 install.sh | awk '{print $1"  install.sh"}' > install.sh.sha256
          echo "checksum: $(cat install.sh.sha256)"

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          cat > "$notes" <<EOF
          Release **Sigil $TAG**: the skill compiler. SKILL.md in, a typed runnable agent harness out.

          ## Install

          \`\`\`bash
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/latest/download/install.sh | bash
          \`\`\`

          The installer pulls the native \`jac\` runtime, fetches Sigil into \`~/.sigil/app\`,
          provisions the compiler's one dependency (PyYAML), and drops a \`sigil\` launcher on
          your PATH. No root; safe to re-run. Verify the download against \`install.sh.sha256\`.

          Then:

          \`\`\`bash
          export OPENAI_API_KEY=sk-...     # your frontier provider key
          sigil serve                      # start the Observatory gateway
          sigil login                      # once — caches a JWT
          sigil solve "extract the tables from report.pdf as csv"
          \`\`\`

          Docs: https://sigilagent.com · https://github.com/$GITHUB_REPOSITORY#readme
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — refreshing assets."
            gh release upload "$TAG" install.sh install.sh.sha256 --clobber
          else
            echo "Creating release $TAG at $GITHUB_SHA."
            gh release create "$TAG" install.sh install.sh.sha256 \
              --target "$GITHUB_SHA" \
              --title "Sigil $TAG" \
              --notes-file "$notes"
          fi
