name: CI

# Run the Jac test suite on every PR into main (and on main itself).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# One run per ref; a new push cancels the previous in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: jac test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The native `jac` is a self-contained binary that bundles its own Python +
      # jaclang + byllm runtime, so there is nothing to `pip install`. The install
      # script drops it in $HOME/.local/bin; we add that to PATH for later steps.
      - name: Install native jac
        run: |
          curl -fsSL https://raw.githubusercontent.com/jaseci-labs/jaseci/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show jac version
        run: jac --version

      # byLLM is bundled in the native binary, but a couple of Python deps are not:
      # PyYAML (the AG-IR compiler parses YAML) and httpx (byLLM's streaming path
      # imports it — chat mode streams the reply token-by-token). Provision both.
      - name: Provision runtime dependencies (PyYAML, httpx)
        run: jac install pyyaml httpx

      # The agent lives in the src/ package. `src/*.test.jac` picks up every annex
      # test (present and future) automatically; report_fix_tests.jac is a standalone
      # regression suite (non-annex name), so it is named explicitly.
      - name: Run test suite
        run: jac test src/*.test.jac src/report_fix_tests.jac
      # SEPARATE process on purpose: loading these annexes in the same jac test
      # invocation as another src module resets the by-llm slot's __globals__
      # (py3.14 lazy-annotation eval then dies with NameError on the slot's own
      # types — reproduce with: jac test src/compiler/ai/spec_loop.test.jac
      # src/report_fix_tests.jac). Runtime bug, process isolation sidesteps it.
      - name: Run AI-compiler test suite
        run: jac test src/compiler/ai/*.test.jac
      # The two MockLLM convergence loops run under `jac run`: multi-module
      # `jac test` resets a by-llm slot's __globals__ and the schema build dies
      # with NameError on the slot's own types (same runtime bug as above).
      - name: Run AI-compiler convergence scenarios
        run: |
          jac run src/compiler/ai/scenarios/spec_loop.jac
          jac run src/compiler/ai/scenarios/workflow_loop.jac
          jac run src/compiler/ai/scenarios/lift_e2e.jac
          jac run src/compiler/ai/scenarios/runtime_budget.jac
          jac run src/compiler/ai/scenarios/replay_probe.jac
